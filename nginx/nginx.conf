user                            www;

worker_processes                auto;

error_log                       /var/log/nginx/error.log warn;

pid                             /var/run/nginx/nginx.pid;

events {
    worker_connections          1024;
}

http {
    include                     /etc/nginx/mime.types;
    default_type                application/octet-stream;
    sendfile                    on;
    access_log                  /var/log/nginx/access.log;
    keepalive_timeout           3000;


    upstream django-login {
        server backend-login:8000;
    }

    upstream django-profile {
        server backend-profile:8001;
    }

    # upstream django-game{
    #     server game:8002;
    # }

    server {
        listen                  80;
        # listen                  443 ssl;
        # server_name             DOMAIN_NAME;
        # ssl_certificate         CERTS_PATH;
        # ssl_certificate_key     CERTS_KEY_PATH;
        # ssl_protocols           TLSv1.2 TLSv1.3;
        root                    /www;
        index                   index.php index.html index.htm index.api;
        client_max_body_size    32m;
        error_page              500 502 503 504  /50x.html;
        location = /50x.html {
              root              /var/lib/nginx/html;
        }
        location = /index.html {
              root              /www;
        }

        location /login/ {
            rewrite ^/login/(.*)$ /$1 break;
            proxy_pass         http://django-login;
            proxy_redirect     off;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Host $server_name;
            proxy_set_header   X-Forwarded-Proto $scheme;
        }

        location /profile/ {
            rewrite ^/profile/(.*)$ /$1 break;
            proxy_pass         http://django-profile;
            proxy_redirect     off;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Host $server_name;
            proxy_set_header   X-Forwarded-Proto $scheme;
        }

        # location /game/ {
        #     proxy_pass         http://django-game;
        #     proxy_redirect     off;
        #     proxy_set_header   Host $host;
        #     proxy_set_header   X-Real-IP $remote_addr;
        #     proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        #     proxy_set_header   X-Forwarded-Host $server_name;
        #     proxy_set_header   X-Forwarded-Proto $scheme;
        # }
    }

    # location /static/ {
    #     alias /path/to/static/files/;
}