version: "3.9"

services:
  app:
    init: true
    container_name: django
    build:
      context: .
      args:
       - DEV=true
    image: jango
    restart: always
    networks:
      - pong_net
    ports:
      - "8000:8000"
    volumes:
      - ./app:/app

networks:
  pong_net:
    name: PongGame