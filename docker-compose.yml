version: "3.9"

services:
  app:
    init: true
    container_name: django
    build:
      context: .
      args:
       - DEV=true
    image: jango
    restart: always
    ports:
      - "8000:8000"
    volumes:
      - ./app:/app
    #command: >
    #sh -c "python mysite/manage.py runserver 0.0.0.0:8000"
  db:
    init: true
    container_name: postgre
    build:
      context: .
      args:
       - DEV=true
    image: PostGre
    restart: always
    ports:
      - "5432:5432"
    volumes:
      - ./app:/app

